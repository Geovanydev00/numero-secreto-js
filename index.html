<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Jogo de adivinhação desenvolvido em JavaScript">
    <title>🎯 Jogo de Adivinhação</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <header>
            <h1>🎯 Jogo de Adivinhação</h1>
            <p class="intro">
                Adivinhe o número secreto entre <strong>1 e 100</strong>.
                Você tem <strong>10 tentativas</strong>.
            </p>
        </header>

        <section class="jogo">

            <form id="form-jogo" autocomplete="off">

                <label for="palpite" class="visually-hidden">
                    Digite seu palpite
                </label>

                <input 
                    type="number" 
                    id="palpite" 
                    name="palpite"
                    min="1" 
                    max="100"
                    placeholder="Digite seu palpite"
                    required
                >

                <button type="submit">
                    Chutar 🚀
                </button>

            </form>

            <p id="mensagem" aria-live="polite">
                🤔 Faça seu primeiro palpite...
            </p>

            <p id="tentativas">
                Tentativas restantes: 10
            </p>

            <button id="reiniciar" class="hidden">
                🔄 Jogar novamente
            </button>

        </section>

        <section class="ranking">
            <h2>🏆 Ranking</h2>
            <ul id="listaRanking"></ul>
        </section>

    </main>

    <script src="script.js" defer></script>

</body>
</html>
